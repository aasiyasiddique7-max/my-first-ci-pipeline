name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # This caches your dependencies so your pipeline runs faster next time
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Tests
      run: |
        # This assumes you are using pytest. 
        # If you don't have tests yet, you can comment this out with '#'
        pytest 

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Simulated Deploy
      run: echo "Tests passed! Ready to deploy to your hosting server."
