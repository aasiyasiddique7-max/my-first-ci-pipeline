name: Python Application CI

# Trigger the pipeline on any push to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  run-tests:
    # Tell GitHub to use their free Linux server
    runs-on: ubuntu-latest

    steps:
    # Step 1: Copy your code onto the GitHub server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Install Python on the GitHub server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install the 'pytest' testing tool
    - name: Install Pytest
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # Step 4: Execute the tests
    - name: Run Tests
      run: |
        pytest test_app.py
